plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.4
  Exclude:
    - "db/schema.rb"
    - "db/migrate/*"
    - "node_modules/**/*"
    - "vendor/**/*"
    - "bin/*"
    - "config/**/*"

Rails:
  Enabled: true

# API + 業務アプリではドキュメントコメントは邪魔
Style/Documentation:
  Enabled: false

# 1行80文字は現実的でない
Layout/LineLength:
  Max: 120

# unless否定は業務で読みにくい
Style/NegatedIf:
  Enabled: false

# before_action多用を許可
Rails/SkipsModelValidations:
  Enabled: false

# has_many dependent: :destroy を強制しない
Rails/HasManyOrHasOneDependent:
  Enabled: false

# enumのprefix/suffixを強制しない（role enum等で邪魔）
Rails/EnumSyntax:
  Enabled: false

# モデルのcallbackは許可
Rails/SaveBang:
  Enabled: false

RSpec/MultipleExpectations:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Rails/I18nLocaleTexts:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/NestedGroups:
  Enabled: false

RSpec/LetSetup:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - 'db/seeds/**/*'

Naming/PredicateMethod:
  Enabled: false

Lint/EmptyBlock:
  Enabled: false
